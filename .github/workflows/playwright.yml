name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        id: run-tests
        run: npm test -- --project=chromium

      - name: Quality gate summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "##  Quality Gate — PASSED" >> $GITHUB_STEP_SUMMARY
            echo "All Playwright tests passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "##  Quality Gate — FAILED" >> $GITHUB_STEP_SUMMARY
            echo "One or more Playwright tests failed. Download the artifacts below for screenshots, videos and the full HTML report." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots & videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
